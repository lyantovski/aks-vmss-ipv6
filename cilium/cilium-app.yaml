apiVersion: v1
kind: Namespace
metadata:
  name: nginx-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hostnet
  namespace: nginx-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-hostnet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: nginx-hostnet
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    # Force Anti-affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nginx-hostnet
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
              hostPort: 8080
              protocol: TCP
          command: ["/bin/sh","-c"]
          args:
            - |
              cat >/etc/nginx/conf.d/default.conf <<'EOF'
              server {
                listen 8080;
                listen [::]:8080;
                server_name _;
                location / {
                  return 200 "nginx hostNetwork OK on $hostname\n";
                }
              }
              EOF
              nginx -g 'daemon off;'
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
--- 
apiVersion: v1
kind: Service
metadata:
  name: nginx-hostnet
  namespace: nginx-demo
  labels:
    app: nginx-hostnet
spec:
  selector:
    app: nginx-hostnet
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP 