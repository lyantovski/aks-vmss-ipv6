apiVersion: batch/v1
kind: CronJob
metadata:
  name: ipv6-orphan-reaper
  namespace: kube-system
spec:
  schedule: "0 * * * *" # Runs every hour
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300 # Clean up job after 5 minutes
      template:
        metadata:
          labels:
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: ipv6-manager-sa
          containers:
          - name: reaper
            image: mcr.microsoft.com/azure-cli:latest
            env:
            - name: NODE_RG
              value: "MC_island-cilium-rg_island-cilium-aks_swedencentral"
            command:
            - /bin/bash
            - -c
            - |
              set -e
              # 1. Login
              echo "[$(date)] Authenticating to Azure via Workload Identity..."
              az login --service-principal -u $AZURE_CLIENT_ID -t $AZURE_TENANT_ID --federated-token $(cat $AZURE_FEDERATED_TOKEN_FILE) > /dev/null

              echo "[$(date)] Starting scan in Resource Group: ${NODE_RG}"

              # 2. Get list of orphaned IPs with metadata (ID, Name, and the actual IP Address)
              # We use -o tsv to make it easy to read into a while loop
              ORPHAN_DATA=$(az network public-ip list -g $NODE_RG \
                --query "[?tags.managedBy=='ipv6-assigner' && ipConfiguration==null].[id,name,ipAddress]" -o tsv)

              if [ -z "$ORPHAN_DATA" ]; then
                echo "[$(date)] Scan complete: No orphaned IPv6 addresses found."
                exit 0
              fi

              # Count orphans for the log
              COUNT=$(echo "$ORPHAN_DATA" | wc -l)
              echo "[$(date)] Found $COUNT orphaned resources to clean up."

              # 3. Iterate and delete with detailed logging
              echo "$ORPHAN_DATA" | while read -r id name ip; do
                echo "------------------------------------------------------------"
                echo "[$(date)] RESOURCE FOUND:"
                echo "  NAME: $name"
                echo "  IP:   ${ip:-N/A (Provisioning/Failed)}"
                echo "  ID:   $id"
                
                echo "[$(date)] Action: Attempting deletion of $name..."
                
                # Run deletion
                if az network public-ip delete --ids "$id"; then
                  echo "[$(date)] Result: Successfully deleted $name."
                else
                  echo "[$(date)] Result: FAILED to delete $name. Check Azure Activity Log for details."
                fi
              done

              echo "------------------------------------------------------------"
              echo "[$(date)] Cleanup job finished."
          restartPolicy: OnFailure